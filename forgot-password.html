<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Document Vault</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-login">
  <div class="card">
    <button class="lang-toggle" onclick="toggleLang()">বাংলা</button>
    <h1 data-i18n="reset_title">🔑 Reset Password</h1>

    <!-- STEP 1: Request OTP -->
    <form id="otp-request-form">
      <p style="margin-bottom:14px; font-size:14px; color:#555;" data-i18n="otp_intro">
        Enter your email and we will send you an OTP code.
      </p>
      <div class="form-group">
        <label data-i18n="label_email">Email</label>
        <input type="email" id="otp-email" required />
      </div>
      <button type="submit" data-i18n="btn_send_otp">Send OTP</button>
    </form>

    <!-- STEP 2: Verify OTP + set new password -->
    <form id="reset-form" class="hidden">
      <div class="form-group">
        <label data-i18n="label_otp_code">OTP code (sent to your email)</label>
        <input type="text" id="otp-code" required />
      </div>
      <div class="form-group">
        <label data-i18n="label_new_password">New Password</label>
        <input type="password" id="new-password" minlength="6" required />
      </div>
      <button type="submit" data-i18n="btn_reset_password">Reset Password</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="link"><a href="index.html" data-i18n="back_to_login">Back to Login</a></div>
  </div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script>
    let userEmail = '';

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    // STEP 1: Send OTP to email
    document.getElementById('otp-request-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      userEmail = document.getElementById('otp-email').value.trim();

      showMsg(t('msg_sending_otp'), '');
      const { error } = await supabaseClient.auth.signInWithOtp({
        email: userEmail,
        options: { shouldCreateUser: false }
      });

      if (error) {
        showMsg(error.message, 'error');
      } else {
        showMsg(t('msg_otp_sent'), 'success');
        document.getElementById('otp-request-form').classList.add('hidden');
        document.getElementById('reset-form').classList.remove('hidden');
      }
    });

    // STEP 2: Verify OTP and update password
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('otp-code').value.trim();
      const newPassword = document.getElementById('new-password').value;

      showMsg(t('msg_verifying'), '');

      const { data, error } = await supabaseClient.auth.verifyOtp({
        email: userEmail,
        token: token,
        type: 'email'
      });

      if (error) {
        showMsg(t('msg_wrong_otp'), 'error');
        return;
      }

      const { error: updateError } = await supabaseClient.auth.updateUser({ password: newPassword });

      if (updateError) {
        showMsg(updateError.message, 'error');
      } else {
        showMsg(t('msg_password_changed'), 'success');
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    });
  </script>
</body>
</html>
